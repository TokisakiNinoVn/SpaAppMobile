plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
//    apply plugin: 'com.google.gms.google-services'

}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader("UTF-8") { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty("flutter.versionCode") ?: "1"
def flutterVersionName = localProperties.getProperty("flutter.versionName") ?: "1.0"

android {
    namespace = "com.example.spa_app"
    compileSdkVersion 35 // Đảm bảo sử dụng phiên bản mới nhất
    ndkVersion = "27.0.12077973"

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8 // Sử dụng Java 8 để hỗ trợ desugaring
        targetCompatibility = JavaVersion.VERSION_1_8
        coreLibraryDesugaringEnabled true // Bật core library desugaring
    }

    kotlinOptions {
        jvmTarget = "1.8" // Phù hợp với Java 8
    }

    defaultConfig {
        applicationId = "com.spa_app.fe_android"
        minSdkVersion 23 // Đảm bảo minSdkVersion hỗ trợ desugaring
        targetSdkVersion 34
        versionCode = flutterVersionCode.toInteger()
        versionName = flutterVersionName
        multiDexEnabled true // Bật multiDex để hỗ trợ desugaring
    }

    buildTypes {
        release {
            signingConfig = signingConfigs.debug // Giữ nguyên cấu hình debug
        }
    }
    buildFeatures {
        viewBinding true
    }
}

dependencies {
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.5' // Thêm dependency cho desugaring
//    id("com.google.gms.google-services") version "4.4.3" apply false
    apply plugin: 'com.google.gms.google-services'


}

flutter {
    source = "../.."
}