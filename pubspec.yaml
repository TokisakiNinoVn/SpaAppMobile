  font_awesome_flutter: ^10.7.0
  intl: ^0.20.0
  geolocator: ^11.1.0
  flutter_map: ^8.0.0
  latlong2: ^0.9.1
  #  fluttertoast: ^8.2.10
  lottie: ^3.3.1
  provider: ^6.1.4
  fl_chart: ^0.69.0
  gallery_saver_plus: ^3.2.0
  crop_your_image: ^2.0.0
  extended_image: ^9.0.0
  image: ^4.6.0

#  image_gallery_saver: ^2.0.3
#  saver_gallery: ^4.0.1
#  gallery_saver: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "lib/assets/images/logo-name.png"
  remove_alpha_ios: true

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - lib/assets/images/
    - lib/assets/
    - lib/assets/data/tinhthanh.json
  fonts:
    - family: Roboto
      fonts:
        - asset: lib/assets/fonts/Roboto/Roboto-Regular.ttf
        - asset: lib/assets/fonts/Roboto/Roboto-Bold.ttf
          weight: 700
